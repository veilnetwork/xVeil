name: xveil
description: "xVeil — decentralized, censorship-resistant messenger and overlay-network client"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # State management — chosen for testability and the ports/adapters
  # architecture (fakes injected via ProviderScope overrides).
  flutter_riverpod: ^2.6.1
  # Declarative routing with redirect-based gating (lock screen / onboarding).
  go_router: ^14.6.2
  # i18n — primary audience is Russian-speaking users in censored regions.
  intl: any
  # App-local directories for the hidden-volume container + node state dir.
  path_provider: ^2.1.5
  # Stable ids for local-only entities.
  uuid: ^4.5.1
  # SHA-256 for content-addressing (piece + manifest hashes). The bundled
  # blake3.dart is single-chunk (<=1 KiB) only — it can't hash multi-KiB pieces.
  crypto: ^3.0.7
  # AEAD (ChaCha20-Poly1305) for the on-disk LARGE-FILE tier (Phase B): blobs too
  # big for the hidden-volume index live as encrypted files on the normal FS,
  # sealed per-piece under a per-blob random key kept in the volume. Vetted Dart
  # crypto — we do NOT hand-roll AEAD for a deniability tool.
  cryptography: ^2.7.0
  # Non-sensitive UI prefs ONLY (theme, locale). Never secrets — those live
  # in the hidden-volume container. See doc/SECURITY-NOTES.md.
  shared_preferences: ^2.3.3
  # QR rendering for the bootstrap-invite contact-exchange flow.
  qr_flutter: ^4.1.0
  # Camera QR scanning for redeeming a contact's invite. Pinned to the same
  # version veil_flutter already pulls in (transitively) to avoid a resolver
  # conflict.
  mobile_scanner: ^5.2.3
  # Pure-Dart SSH client for "My nodes" — connect to a server you run and
  # provision/check a veil node over SSH (no native code).
  dartssh2: ^2.9.0
  # Direct dart:ffi helpers (Utf8/calloc) for the embedded-node binding.
  ffi: ^2.1.0

  # --- Native storage layer (path dep to the hidden-volume submodule) ---
  # The real Storage adapter (HvKvLogStore) binds to this. The plugin ships
  # android/ios/windows native impls today; desktop (macOS/Linux) link glue
  # is pending, so the running app still selects the in-memory SpaceOpener.
  hidden_volume:
    path: third_party/hidden-volume/experimental/flutter_plugin/hidden_volume

  # --- Native overlay-network layer (path dep to the veil submodule) ---
  # The real VeilTransport adapter (VeilFlutterTransport) binds to this. Like
  # hidden_volume it ships android/ios native hooks only; desktop uses the
  # VEIL_FFI_DYLIB preload path. App still selects the loopback transport at
  # runtime until live-node wiring lands.
  veil_flutter:
    path: third_party/veil/flutter/veil_flutter
  file_picker: ^11.0.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  # Generates platform app icons from assets/icon/app_icon.png (veil_icon).
  flutter_launcher_icons: ^0.14.4

# App-icon generation (run: dart run flutter_launcher_icons). Source is the
# veil project's icon, copied into assets/icon/.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  adaptive_icon_background: "#0E1414"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  web:
    generate: false

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate typed localization accessors (AppLocalizations) from the
  # .arb files under lib/l10n/. Configured by l10n.yaml at the repo root.
  generate: true

  assets:
    - assets/icon/app_icon.png
    # Deployment network material (obfs4 PSK). The PSK file itself is gitignored;
    # the dir always holds README.md so clean clones still build.
    - assets/prod/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
